<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SPCK</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <link rel="stylesheet" href="../CSS/checkout.css">
</head>
<body>
    <div class="checkout-container">
        <div class="checkout-form">
            <div class="header">
                <a href="airmax.html" class="back-btn">←</a>
                <h1>Giao hàng</h1>
            </div>
            <section class="form-section">
                <h2>Thông tin</h2>
                <div class="form-row">
                    <div class="form-group">
                        <p>Họ</p>
                        <input type="text" class="form-control">
                    </div>
                    <div class="form-group">
                        <p>Tên</p>
                        <input type="text" class="form-control active">
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label>Số điện thoại</label>
                        <div class="phone-input">
                            <button>🇻🇳 +84</button>
                            <input type="tel" class="form-control">
                        </div>
                    </div>
            </section>

            <section class="form-section">
                <div class="form-row">
                    <div class="form-group">
                        <label>Ngày giao hàng</label>
                        <div class="input-with-icon">
                            <input type="text" class="form-control" placeholder="Tuỳ chọn: Ngày/Tháng/Năm">
                        </div>
                    </div>
                </div>

                <div class="form-row">
                    <div class="dropdown">
                            <p>Thành phố</p>
                            <button type="button" class="form-control1 dropdown-toggle" data-bs-toggle="dropdown">Hồ Chí Minh</button>
                            <ul class="dropdown-menu">
                              <li><a class="dropdown-item" href="#">Hà Nội</a></li>
                              <li><a class="dropdown-item" href="#">Hồ Chí Minh</a></li>
                                <li><a class="dropdown-item" href="#">Đà Nẵng</a></li>
                            </ul>
                        </div>
                    <div class="form-group">
                        <label>Địa chỉ</label>
                        <input type="text" class="form-control" >
                    </div>
                </div>
            </section>

            <section class="form-section">
                <h2>Phương thức thanh toán</h2>
                <div class="payment-methods">
                    <button class="payment-btn">
                        <div class="mastercard">
                            <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcTD7oa6-WXok1YXYt8GN4CWbzJOpeBf69159Q&s" alt="">
                        </div>
                    </button>
                    <button class="payment-btn active">
                        <img src="https://mondialbrand.com/wp-content/uploads/2024/02/visa-logo-preview-1200x1200.png" alt="">
                    </button>
                    <button class="payment-btn">
                        <img src="https://thietkelogo.mondial.vn/wp-content/uploads/2024/02/apple_pay-logo-brandlogos.net_.png" alt="">
                    </button>
                </div>
            </section>
        </div>

        <div class="modal-overlay" id="successModal">
        <div class="success-modal">
            <div class="success-icon-wrapper">
                <div class="success-icon">
                    <svg viewBox="0 0 52 52">
                        <circle class="success-circle" cx="26" cy="26" r="25" fill="none"/>
                        <path class="success-check" fill="none" d="M14.1 27.2l7.1 7.2 16.7-16.8"/>
                    </svg>
                </div>
            </div>
            
            <h2>Đặt hàng thành công!</h2>
            <p class="order-message">Cảm ơn quý khách đã mua hàng</p>
            
            <div class="modal-actions">
                <button class="btn-primary" onclick="window.location.href='main.html'">
                    Về trang chủ
                </button>
            </div>
        </div>
    </div>

        <div class="order-summary">
            <h2>Đơn hàng</h2>
            <div class="product-display">
                <div class="product-image">
                    <img src="./img/airpod.png" alt="">
                </div>
            </div>

            <div class="product-info">
                <h3>AirPods Max</h3>
                <div class="product-options">
                    <div class="option">
                        <p class="label">Màu: Tím</p>
                        <p class="color">Số lượng: 1</p>
                    </div>
                </div>
            </div>

            <button class="checkout-btn">
                Xác nhận →
            </button>
        </div>
    </div>
    <script>
        const checkoutBtn = document.querySelector('.checkout-btn');
        const successModal = document.getElementById('successModal');
        checkoutBtn.addEventListener('click', function() {
            successModal.style.display = 'flex';
            setTimeout(() => {
                successModal.classList.add('show');
            }, 10);
        });
        function closeModal() {
            successModal.classList.remove('show');
            setTimeout(() => {
                successModal.style.display = 'none';
            }, 300);
        };
    </script>
</body>
</html>
