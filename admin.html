<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, shrink-to-fit=no">
    <title>Quản trị - DIEU TECH</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Exo+2:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="./CSS/main.css">
    <script src="./javascript/theme.js"></script>
    <link rel="stylesheet" href="./CSS/admin.css">
</head>
<body>
    <header>
        <nav>
            <a href="index.html"><img src="./img/logo.png" alt="DIEU TECH" class="logo"></a>
            <ul class="nav-links">
                <li><a href="index.html">Trang chủ</a></li>
                <li><a href="admin.html">Quản trị</a></li>
            </ul>
            <div id="adminTopBar" style="display:none; align-items:center; gap:14px;">
                <span class="admin-badge">🛡 Admin</span>
                <button id="adminLogout" style="background:transparent;border:1px solid rgba(255,255,255,0.15);color:var(--text-main);border-radius:8px;padding:8px 14px;font-size:13px;cursor:pointer;">Đăng xuất</button>
            </div>
        </nav>
    </header>

    <div id="adminContent" class="admin-wrap" style="display:none;">
        <div class="admin-header">
            <h1 class="admin-title">Quản lý <span>Sản phẩm</span></h1>
        </div>

        <div class="admin-grid">
            <div class="admin-card">
                <h2>Thêm sản phẩm mới</h2>
                <form id="productForm">
                    <div class="admin-field">
                        <label>Tên sản phẩm</label>
                        <input type="text" id="p-name" placeholder="VD: iPad Pro M5" required>
                    </div>
                    <div class="admin-field">
                        <label>Giá (VNĐ)</label>
                        <input type="number" id="p-price" placeholder="VD: 25990000" min="0" required>
                    </div>
                    <div class="admin-field">
                        <label>Link hình ảnh</label>
                        <input type="url" id="p-img" placeholder="https://..." required>
                        <div class="img-preview" id="imgPreview"><span>Xem trước ảnh</span></div>
                    </div>
                    <div class="admin-field">
                        <label>Mô tả / Thông số (mỗi dòng 1 đặc điểm)</label>
                        <textarea id="p-desc" placeholder="Chip Apple M5&#10;RAM 16GB&#10;Màn hình 13&quot; Liquid Retina" required></textarea>
                        <small>Mỗi dòng sẽ hiển thị như 1 gạch đầu dòng trên thẻ sản phẩm</small>
                    </div>
                    <button type="submit" class="admin-submit">Thêm vào danh sách sản phẩm</button>
                </form>
            </div>
            <div class="admin-card">
                <h2>Sản phẩm đã thêm (<span id="countLabel">0</span>)</h2>
                <div class="admin-list" id="adminList"></div>
            </div>
        </div>
    </div>

    <div id="accessDenied" class="admin-access-denied" style="display:none;">
        <h2>🔒 Khu vực hạn chế</h2>
        <p>Bạn cần đăng nhập bằng tài khoản quản trị để truy cập trang này.</p>
        <a href="login.html" class="button">Đăng nhập</a>
    </div>
    <script src="./javascript/admin.js"></script>
</body>
</html>
